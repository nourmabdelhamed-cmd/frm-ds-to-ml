name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Export nbdev code
        run: uv run nbdev-export

      - name: Verify package imports
        run: uv run python -c "import ipcv; from ipcv.workflow import TrainingConfig; print(TrainingConfig())"

      - name: Run tests
        run: uv run pytest
