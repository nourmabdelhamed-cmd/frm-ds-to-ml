stages:
  localize:
    cmd: uv run python localize.py --config configs/localization.yaml --no-mlflow
    deps:
      - localize.py
      - ipcv/evaluation.py
      - ipcv/failures.py
      - ipcv/localization.py
      - ipcv/localization_workflow.py
      - ipcv/observability.py
      - configs/localization.yaml
    outs:
      - outputs/localization/baseline
  segmentation_train:
    cmd: uv run --group segmentation python train.py --config params.yaml
    deps:
      - train.py
      - ipcv/_workflow_impl.py
      - ipcv/workflow.py
      - params.yaml
    params:
      - project
      - data
      - model
      - training
      - tracking
    outs:
      - models/voc-tiny-unet.pt
